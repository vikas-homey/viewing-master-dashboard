<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Viewings master dashboard — Homey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="design-system/homeywebfoundation.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: var(--lh-body);
      color: var(--fg);
      background: var(--bg-subtle);
    }

    .app {
      display: grid;
      grid-template-columns: 56px 1fr;
      grid-template-rows: 48px auto 1fr;
      height: 100vh;
      min-height: 0;
      overflow: hidden;
    }

    .icon-rail {
      grid-column: 1; grid-row: 1 / -1;
      width: 56px;
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center;
      padding: var(--space-3) 0;
      gap: var(--space-1);
    }
    .rail-logo { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; margin-bottom: var(--space-3); color: var(--purple-600); }
    .rail-item {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-md);
      color: var(--fg-subtle); cursor: pointer;
      transition: background var(--dur-fast);
    }
    .rail-item:hover { background: var(--slate-100); color: var(--fg); }
    .rail-item.is-active { background: var(--purple-50); color: var(--purple-700); }

    .global-header {
      grid-column: 2; grid-row: 1;
      height: 48px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-6);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .header-right { display: flex; align-items: center; gap: var(--space-2); }

    .iteration-bar {
      grid-column: 2; grid-row: 2;
      display: flex; align-items: center; justify-content: space-between; gap: var(--space-4);
      padding: var(--space-3) var(--space-6);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .iteration-bar-left { min-width: 0; }
    .iteration-bar-label { font-size: var(--text-info-label-size); font-weight: var(--fw-semibold); color: var(--fg-muted); }
    .iteration-bar-desc { font-size: var(--text-info-label-size); color: var(--fg-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .iteration-switcher { flex-shrink: 0; overflow-x: auto; }

    /* main scroll replaced by dashboard-body */

    .iteration-panel { display: none; }
    .iteration-panel.is-active { display: block; }

    .proto-tag {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: var(--radius-sm);
      background: var(--purple-50); border: 1px solid var(--purple-200);
      color: var(--purple-700);
      font-size: var(--text-info-label-size); font-weight: var(--fw-semibold);
    }

    .persona-pill {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: 4px 10px; border-radius: var(--radius-full);
      font-size: var(--text-info-label-size); font-weight: var(--fw-semibold);
      margin-bottom: var(--space-3);
    }
    .persona-pill.is-agent { background: var(--purple-50); color: var(--purple-700); border: 1px solid var(--purple-200); }
    .persona-pill.is-owner { background: var(--info-50); color: var(--info-600); border: 1px solid var(--slate-200); }

    /* ── Iteration 1: Day map ── */
    .runway-hero {
      background: var(--bg);
      border: 2px solid var(--purple-400);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-5);
    }
    .runway-hero-label { font-size: var(--text-info-label-size); font-weight: var(--fw-semibold); color: var(--purple-700); margin-bottom: var(--space-2); }
    .runway-hero-main { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-4); flex-wrap: wrap; }
    .runway-hero-time { font-size: var(--text-display-h1-size); font-weight: var(--fw-bold); color: var(--fg-strong); line-height: 1; }
    .runway-track { position: relative; padding-left: var(--space-6); }
    .runway-track::before {
      content: '';
      position: absolute; left: 11px; top: 8px; bottom: 8px;
      width: 2px; background: var(--border);
    }
    .runway-node { position: relative; padding-bottom: var(--space-5); }
    .runway-node:last-child { padding-bottom: 0; }
    .runway-dot {
      position: absolute; left: calc(-1 * var(--space-6) + 4px); top: 14px;
      width: 14px; height: 14px; border-radius: var(--radius-full);
      background: var(--bg); border: 2px solid var(--border);
    }
    .runway-node.is-now .runway-dot { border-color: var(--purple-600); background: var(--purple-600); box-shadow: 0 0 0 4px var(--purple-100); }
    .runway-node.is-done .runway-dot { border-color: var(--success-600); background: var(--success-600); }
    .runway-gap {
      margin: var(--space-2) 0 var(--space-4);
      padding: var(--space-2) var(--space-3);
      border-left: 2px dashed var(--border-strong);
      font-size: var(--text-info-label-size); color: var(--fg-muted);
    }
    .runway-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: var(--space-4);
    }
    .runway-card.is-now { border-color: var(--purple-400); background: var(--purple-50); }
    .runway-card-top { display: flex; justify-content: space-between; gap: var(--space-3); margin-bottom: var(--space-2); }
    .runway-card-title { font-size: var(--text-h3-size); font-weight: var(--fw-semibold); color: var(--fg-strong); }
    .runway-card-meta { font-size: var(--text-info-label-size); color: var(--fg-muted); }

    .dispatch-wrap {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: auto;
      box-shadow: var(--shadow-sm);
    }
    .dispatch-grid {
      display: grid;
      grid-template-columns: 140px repeat(8, minmax(88px, 1fr));
      min-width: 900px;
    }
    .dispatch-cell {
      padding: var(--space-3);
      border-right: 1px solid var(--slate-100);
      border-bottom: 1px solid var(--slate-100);
      min-height: 72px;
      font-size: var(--text-info-label-size);
    }
    .dispatch-cell.is-head {
      background: var(--slate-50); font-weight: var(--fw-semibold);
      color: var(--fg-muted); position: sticky; top: 0; z-index: 1;
    }
    .dispatch-cell.is-agent {
      font-weight: var(--fw-semibold); color: var(--fg-strong);
      background: var(--bg); position: sticky; left: 0; z-index: 1;
      border-right: 1px solid var(--border);
    }
    .dispatch-cell.is-now { background: var(--purple-50); }
    .dispatch-chip {
      display: block; padding: 6px 8px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg);
      margin-bottom: 4px;
      line-height: 1.35;
    }
    .dispatch-chip strong { display: block; color: var(--fg-strong); font-size: var(--text-info-label-size); }
    .dispatch-chip span { color: var(--fg-muted); font-size: var(--text-info-label-size); }
    .dispatch-chip.is-clash { border-color: var(--danger-600); background: var(--danger-50); }
    .dispatch-chip.is-gap { border-style: dashed; color: var(--fg-subtle); background: transparent; text-align: center; padding: 10px 6px; }

    /* ── Iteration 2: Property lens ── */
    .portfolio-strip {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-4);
    }
    .portfolio-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: var(--space-4);
      box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column; gap: var(--space-4);
    }
    .portfolio-card-head strong { display: block; font-size: var(--text-h3-size); color: var(--fg-strong); }
    .portfolio-card-head span { font-size: var(--text-info-label-size); color: var(--fg-muted); }
    .funnel { display: flex; height: 8px; border-radius: var(--radius-full); overflow: hidden; background: var(--slate-100); }
    .funnel-seg { height: 100%; }
    .funnel-seg.is-scheduled { background: var(--slate-400); }
    .funnel-seg.is-confirmed { background: var(--purple-500); }
    .funnel-seg.is-done { background: var(--success-600); }
    .funnel-legend { display: flex; flex-wrap: wrap; gap: var(--space-3); font-size: var(--text-info-label-size); color: var(--fg-muted); }
    .funnel-legend i { display: inline-block; width: 8px; height: 8px; border-radius: var(--radius-full); margin-right: 4px; vertical-align: middle; }
    .portfolio-next {
      padding: var(--space-3); border-radius: var(--radius-md);
      background: var(--slate-50); border: 1px solid var(--slate-100);
    }
    .portfolio-next-label { font-size: var(--text-info-label-size); font-weight: var(--fw-semibold); color: var(--fg-muted); margin-bottom: 4px; }

    .health-matrix-wrap {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .health-matrix .table { margin: 0; }
    .health-risk { display: inline-flex; align-items: center; gap: 6px; }
    .health-risk-dot { width: 8px; height: 8px; border-radius: var(--radius-full); }
    .health-risk-dot.is-high { background: var(--danger-600); }
    .health-risk-dot.is-med { background: var(--orange-600); }
    .health-risk-dot.is-low { background: var(--success-600); }
    .health-bar { display: flex; align-items: center; gap: var(--space-2); }
    .health-bar-track { flex: 1; height: 6px; background: var(--slate-100); border-radius: var(--radius-full); overflow: hidden; max-width: 80px; }
    .health-bar-fill { height: 100%; background: var(--success-600); border-radius: var(--radius-full); }
    .health-bar-fill.is-warn { background: var(--orange-600); }
    .health-bar-fill.is-bad { background: var(--danger-600); }

    /* ── Iteration 3: Exception lens ── */
    .task-stack { display: flex; flex-direction: column; gap: var(--space-3); max-width: 640px; }
    .task-card {
      display: grid; grid-template-columns: auto 1fr auto;
      gap: var(--space-4); align-items: center;
      padding: var(--space-4);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: background var(--dur-fast);
    }
    .task-card:hover { background: var(--slate-50); }
    .task-priority {
      width: 4px; align-self: stretch; border-radius: var(--radius-full);
      background: var(--slate-300);
    }
    .task-priority.is-high { background: var(--danger-600); }
    .task-priority.is-med { background: var(--orange-600); }
    .task-priority.is-low { background: var(--info-600); }
    .task-title { font-size: var(--text-body-size); font-weight: var(--fw-semibold); color: var(--fg-strong); }
    .task-context { font-size: var(--text-info-label-size); color: var(--fg-muted); margin-top: 2px; }
    .task-due { font-size: var(--text-info-label-size); color: var(--fg-muted); white-space: nowrap; text-align: right; }
    .task-due.is-overdue { color: var(--danger-700); font-weight: var(--fw-semibold); }

    .radar-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-4);
    }
    @media (max-width: 900px) { .radar-grid { grid-template-columns: 1fr; } }
    .radar-panel {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: var(--space-5);
      box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column; gap: var(--space-4);
    }
    .radar-panel.is-hot { border-color: var(--danger-600); }
    .radar-panel-head { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-3); }
    .radar-count { font-size: 32px; font-weight: var(--fw-bold); color: var(--fg-strong); line-height: 1; }
    .radar-trend { font-size: var(--text-info-label-size); color: var(--fg-muted); }
    .radar-trend.is-up { color: var(--danger-700); }
    .radar-list { display: flex; flex-direction: column; gap: var(--space-2); }
    .radar-item {
      display: flex; justify-content: space-between; gap: var(--space-3);
      padding: var(--space-3); border-radius: var(--radius-md);
      background: var(--slate-50); font-size: var(--text-info-label-size);
    }
    .radar-item strong { color: var(--fg-strong); font-size: var(--text-body-size); display: block; }
    .radar-item span { color: var(--fg-muted); }

    .iter-mount { min-height: 120px; }

    .dashboard-body {
      grid-column: 2; grid-row: 3;
      display: flex; gap: var(--space-6);
      min-height: 0; overflow: hidden;
      padding: var(--space-6);
      align-items: stretch;
    }
    .dashboard-canvas {
      flex: 1; min-width: 0; overflow-y: auto;
    }
    .dashboard-canvas .iteration-panel.is-active { display: block; }

    .is-clickable-viewing { cursor: pointer; transition: background var(--dur-fast), border-color var(--dur-fast); }
    .runway-card.is-clickable-viewing:hover { background: var(--slate-50); }
    .runway-card.is-selected, .dispatch-chip.is-selected, .portfolio-next.is-selected,
    .task-card.is-selected, .health-matrix tbody tr.is-selected, .radar-item.is-selected {
      outline: 2px solid var(--purple-400);
      background: var(--purple-50);
    }
    .dispatch-chip.is-clickable-viewing { cursor: pointer; }
    .dispatch-chip.is-clickable-viewing:hover { background: var(--slate-50); }
    .health-matrix tbody tr.is-clickable-viewing { cursor: pointer; }
    .radar-item.is-clickable-viewing { cursor: pointer; }
    .radar-item.is-clickable-viewing:hover { background: var(--slate-100); }

    @media (max-width: 1100px) {
      .dashboard-body { flex-direction: column; overflow-y: auto; }
      .viewing-detail-dock { width: 100% !important; max-height: 50vh; }
    }

    /* Status badges */
    .vf-badge {
      display: inline-flex; align-items: center; gap: var(--space-1);
      height: auto; padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      font-size: var(--text-info-label-size); font-weight: var(--fw-semibold); line-height: 1.5;
      white-space: nowrap;
    }
    .vf-badge svg { width: 16px; height: 16px; flex-shrink: 0; }
    .badge-scheduled  { background: #f8fafc; border-color: #e2e8f0; color: #64748b; }
    .badge-confirmed  { background: #dbeafe; border-color: #bfdbfe; color: #2563eb; }
    .badge-completed  { background: var(--success-50); border-color: #6ee7b7; color: var(--success-600); }
    .badge-no-show    { background: #fef2f2; border-color: #fecaca; color: #ef4444; }
    .badge-cancelled  { background: #fef7ec; border-color: #fbd3a7; color: #ff7214; }

    /* Offer badges on completed cards — Figma 4172:22372 */
    .vf-offer-badge {
      display: inline-flex; align-items: center; gap: var(--space-1);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      font-size: var(--text-info-label-size); font-weight: var(--fw-semibold); line-height: 1.5;
      white-space: nowrap; background: var(--bg);
    }
    .vf-offer-badge svg { width: 16px; height: 16px; flex-shrink: 0; }
    .vf-offer-badge--pending { border-color: #bfdbfe; color: #2563eb; }
    .vf-offer-badge--information { border-color: #e2e8f0; color: #64748b; }
    .vf-offer-badge--success { border-color: #6ee7b7; color: var(--success-600); }

    /* ── Detail dock — Figma 4144:19379 + design-system typography ── */
    .viewing-detail-dock {
      display: flex; flex-direction: column;
      width: 413px; flex-shrink: 0;
      background: var(--bg);
      border-radius: var(--radius-xl);
      border: none;
      overflow: hidden;
      min-height: 0;
      max-height: 100%;
      height: 100%;
      align-self: stretch;
      box-shadow: 0 2px 14.1px rgba(0, 0, 0, 0.08);
      padding: var(--space-6) var(--space-3);
      box-sizing: border-box;
      font-family: var(--font-sans);
    }
    .viewing-detail-dock .text-h2 { color: var(--fg); margin: 0; }
    .viewing-detail-dock .text-h3 { margin: 0; }
    .viewing-detail-dock .dock-form-label {
      font-size: var(--text-body-size);
      font-weight: var(--fw-semibold);
      line-height: var(--lh-body);
      color: var(--fg-muted);
      display: block;
    }
    .viewing-detail-dock .dock-field-regular {
      font-size: var(--text-body-size);
      font-weight: var(--fw-regular);
      line-height: var(--lh-body);
      color: var(--fg);
      display: block;
    }
    .viewing-detail-dock .dock-inline-label,
    .viewing-detail-dock .dock-help-text {
      font-size: var(--text-info-label-size);
      font-weight: var(--fw-regular);
      line-height: var(--lh-auto);
      color: var(--fg);
      margin: 0;
    }
    .viewing-detail-dock .dock-help-text { margin-top: var(--space-1); }
    .viewing-detail-dock .dock-hero-schedule { color: var(--purple-500); margin: 0; }
    .viewing-detail-dock.is-empty .dock-body {
      padding: 0;
    }

    /* Dock header — Figma 4144:19382 */
    .dock-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0;
      flex-shrink: 0;
      gap: var(--space-3);
      background: transparent;
      margin-bottom: var(--space-6);
      min-height: 32px;
    }
    .dock-header-left {
      display: flex; align-items: center; gap: 6px;
      min-width: 0; flex: 1;
    }
    .dock-header-title { flex-shrink: 0; color: #334155; }
    .dock-header-actions {
      display: flex; align-items: center; gap: var(--space-3);
      flex-shrink: 0;
    }
    .dock-activity-back {
      flex-shrink: 0;
      padding: 4px 8px;
      font-size: 13px;
      gap: 4px;
    }
    .dock-activity-back[hidden] { display: none !important; }
    #dock-menu-wrap[hidden] { display: none !important; }
    #dock-autosave-wrap[hidden] { display: none !important; }
    .dock-menu-wrap { position: relative; }
    .dock-menu-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); border: 1px solid #cbd5e1; border-radius: var(--radius-md);
      cursor: pointer; color: var(--fg); flex-shrink: 0;
      padding: 0;
    }
    .dock-menu-btn svg { width: 18px; height: 18px; }
    .dock-menu-btn:hover { background: var(--slate-50); color: var(--fg); }
    .dock-dropdown {
      position: absolute; top: calc(100% + 4px); right: 0;
      width: 220px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-md); box-shadow: var(--shadow-md);
      z-index: 100; padding: 4px;
    }
    .dock-dropdown[hidden] { display: none; }
    .dock-dd-section { padding: 4px 8px 2px; }
    .dock-dd-section[hidden] { display: none; }
    .dock-dd-section-label {
      font-size: var(--fs-xs); font-weight: 600; color: var(--fg-muted);
      letter-spacing: 0.01em;
    }
    .dock-dd-item {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 8px 10px;
      font-family: inherit; font-size: var(--fs-sm); color: var(--fg-strong);
      background: none; border: none; border-radius: var(--radius-sm);
      cursor: pointer; text-align: left;
    }
    .dock-dd-item[hidden] { display: none; }
    .dock-dd-item:hover { background: var(--slate-50); }
    .dock-dd-item svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--fg-muted); }
    .dock-dd-sep { height: 1px; background: var(--border); margin: 4px 0; }
    .dock-dd-sep[hidden] { display: none; }

    /* Dock body */
    .dock-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      display: flex; flex-direction: column; gap: var(--space-10);
      padding: 0;
      background: transparent;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .dock-body::-webkit-scrollbar { display: none; }

    #dock-footer {
      flex-shrink: 0;
    }

    /* Dock empty state — Figma 4244:22028 */
    .dock-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 40px; width: 100%;
    }
    .dock-empty-illus {
      position: relative; width: 249px; height: 230px; flex-shrink: 0;
    }
    .dock-ghost-card {
      position: absolute; left: 0; width: 249px; height: 58px;
      border-radius: 8px;
      border: 1px solid rgba(194,212,227,0.5);
      background: transparent;
    }
    .dock-ghost-card--top { top: 0; }
    .dock-ghost-card--mid { top: 85px; background: #ebf1f6; }
    .dock-ghost-card--bot { top: 171px; }
    .dock-ghost-cursor {
      position: absolute; top: 119px; left: 158px;
      width: 48px; height: 48px; color: #94a3b8;
    }
    .dock-empty-text { text-align: center; width: 100%; }
    .dock-empty-title { color: var(--fg-subtle); margin: 0 0 var(--space-2); }
    .dock-empty-sub { color: var(--fg-muted); margin: 0; }

  function renderDayMapAgent() {
    const today = scopeViewings().filter(v => v.date === TODAY && v.status !== 'cancelled').sort(compareTime);

    let next = today.find(v => timeToMins(v.time) >= nowMins && !['completed','no_show'].includes(v.status)) || today.find(v => !['completed','no_show'].includes(v.status));
    const hero = next ? (() => { const p = prop(next); return vid(next.id, 'runway-hero', `<div class="runway-hero-label">Next up</div><div class="runway-hero-main"><div><div class="runway-hero-time">${esc(fmtClock(next.time))}</div><div class="text-h3" style="margin-top:8px">${esc(next.viewer)} at ${esc(p.address)}</div><div class="text-info-label" style="margin-top:4px">${esc(p.ref)}</div></div>${badge(next.status)}</div>`); })() : '';
    let prevPid = null;
    const track = today.map(v => {
      const p = prop(v); const mins = timeToMins(v.time);
      const isNow = mins <= nowMins && mins + (v.duration||30) > nowMins;
      const isDone = ['completed','no_show'].includes(v.status) || mins + (v.duration||30) <= nowMins;
      let gap = prevPid && prevPid !== v.propertyId ? `<div class="runway-gap">Travel to ${esc(p.address)}</div>` : '';

  function propertyStats(pid, viewings) {
    const scheduled = viewings.filter(v => v.status === 'scheduled').length;
    const confirmed = viewings.filter(v => v.status === 'confirmed').length;
    const done = viewings.filter(v => v.status === 'completed').length;
    const missingFb = viewings.filter(v => v.status === 'completed' && !v.summary?.trim()).length;
    const offers = viewings.filter(v => v.offerPrice).length;
    const upcoming = viewings.filter(v => v.date >= TODAY && ['scheduled','confirmed'].includes(v.status)).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time))[0];
    const total = scheduled + confirmed + done || 1;
    return { scheduled, confirmed, done, missingFb, offers, upcoming, total };
  }

  function buildTasks(viewings) {
    const tasks = [];
    viewings.forEach(v => {
      const p = prop(v);
      if (v.status === 'no_show') tasks.push({ priority:'high', title:'Rebook no show', context:`${v.viewer} · ${p.address}`, due:'Today', v });
      if (v.status === 'completed' && !v.summary?.trim()) tasks.push({ priority:'high', title:'Record feedback', context:`${v.viewer} · ${p.address}`, due:'Overdue', v });
      if (v.status === 'scheduled' && v.date <= TODAY) tasks.push({ priority:'med', title:'Chase confirmation', context:`${v.viewer} · ${p.address}`, due:fmtClock(v.time), v });
    });
    return tasks.sort((a,b)=>({high:0,med:1,low:2}[a.priority]-{high:0,med:1,low:2}[b.priority]));
  }

  const OFFER_BADGE_ICON = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4.5 3.5h5a2.25 2.25 0 0 1 0 4.5h-5M8 3.5v9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  function badgeHtml(status) {
    const cls = { scheduled: 'badge-scheduled', confirmed: 'badge-confirmed',
      completed: 'badge-completed', no_show: 'badge-no-show', cancelled: 'badge-cancelled' }[status] || 'badge-scheduled';
    return `<span class="vf-badge ${cls}">${BADGE_ICONS[status] || ''}${esc(STATUS_LABEL[status] || status)}</span>`;
  }


  function badgeHtml(status) {
    const cls = { scheduled: 'badge-scheduled', confirmed: 'badge-confirmed',
      completed: 'badge-completed', no_show: 'badge-no-show', cancelled: 'badge-cancelled' }[status] || 'badge-scheduled';
    return `<span class="vf-badge ${cls}">${BADGE_ICONS[status] || ''}${esc(DOCK_STATUS_LABEL[status] || status)}</span>`;
  }


  function getSimulatedDate() { return TODAY; }
  function toDateTime(v) { return new Date(`${v.date}T${v.time || '00:00'}`); }
  function fmtTime(v) { return toDateTime(v).toLocaleString('en-GB', { hour: '2-digit', minute: '2-digit' }); }

  function fmtEndTime(timeStr, mins = 30) {
    const [h, m] = timeStr.split(':').map(Number);
    return new Date(2000, 0, 1, h, m + mins).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }
  function endTime24(timeStr, mins = 30) {
    const [h, m] = timeStr.split(':').map(Number);
    const d = new Date(2000, 0, 1, h, m + mins);
    return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  }

  function fmtScheduleLabel(v) {
    const today = new Date(`${getSimulatedDate()}T12:00`);
    const d = new Date(`${v.date}T12:00`);
    const diff = Math.round((d - today) / 86400000);
    let day = diff === 0 ? 'Today' : diff === 1 ? 'Tomorrow' : diff === -1 ? 'Yesterday'
      : d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    return `${day}, ${fmtTime(v)} - ${fmtEndTime(v.time, v.duration || 30)}`;
  }


  function viewerInitials(name) {
    return name.split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }
  function viewerFirstName(name) { return name.split(/\s+/)[0]; }

  const TOAST_ICONS = {
    positive: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>',
    informative: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
    neutral: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
    negative: '!'
  };

  function toastTypeClass(type) {
    if (type === 'success' || type === 'positive') return 'toast-positive';
    if (type === 'danger' || type === 'negative') return 'toast-negative';
    if (type === 'info' || type === 'informative') return 'toast-informative';
    if (type === 'warning') return 'toast-warning';
    if (type === 'neutral') return 'toast-neutral';
    return 'toast-positive';
  }

  function toastIconKey(type) {
    if (type === 'danger' || type === 'negative' || type === 'warning') return 'negative';
    if (type === 'info' || type === 'informative') return 'informative';
    if (type === 'neutral') return 'neutral';
    return 'positive';
  }

  function dismissToast() {
    const t = $('#toast');
    if (!t) return;
    clearTimeout(t._timer);
    t.classList.remove('is-visible');
  }

  function showToast(title, msg, type = 'success') {
    const t = $('#toast');
    const icon = $('#toast-icon');
    if (!t) return;

    const variant = toastTypeClass(type);
    const iconKey = toastIconKey(type);

    t.className = `toast ${variant} is-visible`;
    $('#toast-title').textContent = title;
    $('#toast-msg').textContent = msg || '';
    if (icon) icon.innerHTML = TOAST_ICONS[iconKey];

    clearTimeout(t._timer);
    t._timer = setTimeout(dismissToast, 5000);
  }

  // ── Dock rendering ────────────────────────────────────────────────────
  function getSelected() { return VIEWINGS.find(v => v.id === selectedId); }

  function activityAvatarHtml(agents) {
    return `<div class="activity-avatars">${agents.map((a, i) =>
      `<div class="avatar" style="background:var(--purple-${i===0?'600':'200'});color:${i===0?'#fff':'var(--purple-700)'};width:22px;height:22px;font-size:9px;">${esc(a)}</div>`
    ).join('')}</div>`;
  }

  function getActivityEntries(v) {
    return v.activity.length ? v.activity : [{ agents: ['JA'], text: 'No activity yet', time: '' }];
  }

  function activityEntryHtml(e) {
    return `<div class="activity-entry">
      ${activityAvatarHtml(e.agents)}
      <span class="text-body activity-text">${esc(e.text)}</span>
      ${e.time ? `<span class="text-body activity-time">${esc(e.time)}</span>` : ''}
    </div>`;
  }

  function buildDockHeroHtml(v) {
    const agentName = v.agent || 'Towers Wills';
    const logisticsHtml = `
      <div class="dock-hero-logistics">
        <div class="dock-hero-detail-row">
          <span>Accompanied by</span><span>${esc(v.accompaniedBy || v.type)}</span>
        </div>
        <div class="dock-hero-detail-row">
          <span>Assigned agent</span>
          <span class="dock-hero-agent-val">
            <span class="avatar dock-hero-agent-avatar">${esc(viewerInitials(agentName))}</span>
            ${esc(agentName)}
          </span>
        </div>
      </div>`;

    return `
      <div class="dock-hero">
        <div class="dock-hero-top">
          <div class="avatar dock-hero-avatar">${esc(viewerInitials(v.viewer))}</div>
          <div class="dock-hero-meta">
            <div class="dock-hero-name-row">
              <div class="dock-hero-name-stack">
                <h2 class="text-h3">${esc(v.viewer)}</h2>

          </div>

      </div>
      ${logisticsHtml}`;

  function buildActivityPreviewHtml(v) {
    const all = getActivityEntries(v);
    const preview = all.slice(0, 2);
    const showViewAll = all.length > 2;
    return `
      <div class="dock-section dock-section--activity">
        <div class="dock-section-heading">
          <h3 class="text-h2">Activity Log</h3>
          <span class="dock-section-heading-line"></span>
        </div>
        <div class="activity-list" id="dock-activity-list">
          ${preview.map(activityEntryHtml).join('')}
        </div>
        ${showViewAll ? `
          <div class="activity-view-all-wrap">
            <button type="button" class="activity-view-all" id="dock-activity-all">
              View Full Activity
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>` : ''}
      </div>`;

  function buildActivityFullHtml(v) {
    const all = getActivityEntries(v);
    return `
      <div class="dock-section dock-section--activity-full">
        <div class="activity-list activity-list--full" id="dock-activity-list-full">
          ${all.map(activityEntryHtml).join('')}

  function setDockHeaderMode(mode) {
    const title = $('#dock-header-title');
    const back = $('#dock-activity-back');
    const menu = $('#dock-menu-wrap');
    const autosaveWrap = $('#dock-autosave-wrap');
    const isActivity = mode === 'activity';
    if (title) title.textContent = isActivity ? 'Activity Log' : 'Viewing Details';
    if (back) back.hidden = !isActivity;
    if (menu) menu.hidden = isActivity;
    if (autosaveWrap) {
      if (isActivity) {
        autosaveWrap.hidden = true;
      } else {
        const selected = getSelected();
        autosaveWrap.hidden = !(selected && selected.status === 'completed');
      }
    }
  }

  function updateDockAutosaveVisibility(v) {
    const wrap = $('#dock-autosave-wrap');
    if (!wrap) return;
    const show = v && v.status === 'completed' && !dockActivityFullView;
    wrap.hidden = !show;
    if (!show) setAutosaveStatus('idle');
  }

  function updateDockMenu(v) {
    const dd = $('#dock-dropdown');
    if (!dd || !v) return;

    const statusActions = ['mark-confirmed', 'mark-completed', 'mark-noshow', 'cancel-viewing'];
    const editActions = ['reschedule', 'schedule-new', 'edit-applicant', 'delete-viewing'];
    const setHidden = (sel, hidden) => { const el = dd.querySelector(sel); if (el) el.hidden = hidden; };

    $$('.dock-dd-item', dd).forEach(el => { el.hidden = false; });

    if (v.status === 'scheduled') {
      setHidden('[data-action="mark-completed"]', true);
      setHidden('[data-action="schedule-new"]', true);
    } else if (v.status === 'confirmed') {
      setHidden('[data-action="mark-confirmed"]', true);
      setHidden('[data-action="schedule-new"]', true);
    } else if (v.status === 'completed') {
      statusActions.forEach(a => setHidden(`[data-action="${a}"]`, true));
      setHidden('[data-action="schedule-new"]', true);
      setHidden('[data-action="delete-viewing"]', true);
    } else if (v.status === 'no_show') {
      statusActions.forEach(a => setHidden(`[data-action="${a}"]`, true));
      setHidden('[data-action="reschedule"]', true);
      setHidden('[data-action="delete-viewing"]', true);
    } else if (v.status === 'cancelled') {
      statusActions.forEach(a => setHidden(`[data-action="${a}"]`, true));
      setHidden('[data-action="reschedule"]', true);
    }

    const anyStatusVisible = statusActions.some(a => !dd.querySelector(`[data-action="${a}"]`)?.hidden);
    const anyEditVisible = editActions.some(a => !dd.querySelector(`[data-action="${a}"]`)?.hidden);

    setHidden('#dock-dd-status-section', !anyStatusVisible);
    setHidden('#dock-dd-sep', !anyStatusVisible || !anyEditVisible);
    setHidden('#dock-dd-edit-section', !anyEditVisible);
  }

  function setDockShellState(hasSelection) {
    const dock = $('#viewing-detail-dock');
    const header = $('#dock-header');
    if (dock) dock.classList.toggle('is-empty', !hasSelection);
    if (header) header.hidden = !hasSelection;
  }

  function renderDock() {
    const body = $('#dock-body');
    const footer = $('#dock-footer');
    if (!body) return;

    const v = getSelected();

    if (!v) {
      dockActivityFullView = false;
      setDockShellState(false);
      body.innerHTML = `
        <div class="dock-empty">
          <div class="dock-empty-illus" aria-hidden="true">
            <div class="dock-ghost-card dock-ghost-card--top"></div>
            <div class="dock-ghost-card dock-ghost-card--mid"></div>
            <div class="dock-ghost-card dock-ghost-card--bot"></div>
            <svg class="dock-ghost-cursor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M5 3l14 9-7 1-3 7L5 3z"/></svg>
          </div>
          <div class="dock-empty-text">
            <p class="text-h3 dock-empty-title">Nothing selected yet</p>
            <p class="text-body dock-empty-sub">Pick a viewing from the list to see the full details</p>
          </div>
        </div>`;
      if (footer) footer.innerHTML = '';
      return;
    }

    setDockShellState(true);

    updateDockMenu(v);

    if (dockActivityFullView) {
      setDockHeaderMode('activity');
      body.innerHTML = buildActivityFullHtml(v);
      if (footer) footer.innerHTML = '';
      $('#dock-activity-back')?.addEventListener('click', () => {
        dockActivityFullView = false;
        renderDock();
      });
      
      
      
      return;
    }

    setDockHeaderMode('details');

    const activityHtml = buildActivityPreviewHtml(v);

    updateDockAutosaveVisibility(v);

    const assessmentHtml = v.status === 'completed' ? `
      <div class="assessment-section">
        <div class="assessment-header">
          <p class="text-h2 assessment-title">Applicant Assessment</p>
          <span class="assessment-heading-line"></span>
        </div>
        <div class="assessment-fields">
          <div class="assessment-field">
            <label class="dock-form-label" for="dock-feedback-notes">Feedback &amp; Notes</label>
            <textarea class="input textarea" id="dock-feedback-notes" rows="3" placeholder="Log what the applicant said about the property and your own assessment of the viewing">${esc(v.summary)}</textarea>
            <p class="dock-help-text">Visible to your team and vendor</p>
          </div>
          <div class="assessment-field assessment-field--select">
            <label class="dock-field-regular" for="dock-interest">Interest Level</label>
            <select class="input" id="dock-interest">
              <option value="" ${!v.interest ? 'selected' : ''} disabled>Select interest level</option>
              <option value="very-interested" ${v.interest === 'very-interested' ? 'selected' : ''}>Very interested</option>
              <option value="interested" ${v.interest === 'interested' ? 'selected' : ''}>Interested</option>
              <option value="neutral" ${v.interest === 'neutral' ? 'selected' : ''}>Neutral</option>
              <option value="not-interested" ${v.interest === 'not-interested' ? 'selected' : ''}>Not interested</option>
            </select>
          </div>
          <div class="assessment-field assessment-field--select">
            <label class="dock-field-regular" for="dock-buying-situation">Buying Situation</label>
            <select class="input" id="dock-buying-situation">
              <option value="" ${!v.buyingSituation ? 'selected' : ''} disabled>Select buying situation</option>
              ${BUYING_SITUATION_OPTIONS.map(o => `<option value="${o.value}" ${v.buyingSituation === o.value ? 'selected' : ''}>${esc(o.label)}</option>`).join('')}
            </select>
          </div>
          <div class="price-toggle-row">
            <span class="dock-form-label price-toggle-label">Price Proposed ?<span class="asterisk">*</span></span>
            <label class="toggle-wrap" aria-label="Price proposed">
              <input type="checkbox" class="toggle-input" id="dock-price-proposed" ${v.priceProposed ? 'checked' : ''}>
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </label>
          </div>
          <div class="assessment-field dock-proposed-price" id="dock-proposed-price-wrap" ${v.priceProposed ? '' : 'hidden'}>
            <label class="dock-form-label" for="dock-proposed-price">Proposed Price</label>
            <div class="currency-input-wrap">
              <span class="currency-prefix">£</span>
              <input type="text" class="input" id="dock-proposed-price" inputmode="numeric" placeholder="Enter amount" value="${v.proposedPrice != null ? esc(String(v.proposedPrice)) : ''}">
            </div>
          </div>
        </div>
      </div>` : '';

    const noShowHtml = v.status === 'no_show' ? `
      <div class="dock-section">
        <p class="rebook-meta">Rebook attempt ${v.rebook} of 3</p>
        ${v.rebook >= 3 ? `<p class="rebook-warn">You've reached the maximum rebook attempts. Mark ${esc(viewerFirstName(v.viewer))} as a lost lead or schedule a new viewing if you've spoken to them directly.</p>` : ''}
      </div>` : '';

    const cancelledHtml = v.status === 'cancelled' ? `
      <div class="dock-section">
        ${v.cancelReason ? `<span class="dock-form-label">Cancellation reason</span>
        <p class="text-body" style="text-align:left;margin-top:var(--space-1);">${esc(v.cancelReason)}</p>` : ''}
        <p class="rebook-meta"${v.cancelReason ? ' style="margin-top:var(--space-3)"' : ''}>Rebook attempt ${v.rebook || 0} of 3</p>
        ${(v.rebook || 0) >= 3 ? `<p class="rebook-warn">You've reached the maximum rebook attempts. Mark ${esc(viewerFirstName(v.viewer))} as a lost lead or schedule a new viewing if you've spoken to them directly.</p>` : ''}
      </div>` : '';

    const lostHtml = v.leadLost && v.lostReason ? `
      <div class="dock-section">
        <span class="dock-form-label">Reason for losing the lead</span>
        <p class="text-body" style="text-align:left;margin-top:var(--space-1);">${esc(v.lostReason)}</p>
      </div>` : '';

    const agentNotesHtml = `
      <div class="dock-section dock-section--agent-notes">
        <span class="dock-agent-notes-label">Agent notes</span>
        <textarea class="input textarea" id="dock-agent-notes" rows="4" placeholder="Access instructions, notes for the viewing…" aria-label="Agent notes">${esc(v.notesInternal)}</textarea>
        <p class="dock-help-text">Only visible to your team, not shared with vendor</p>
      </div>`;

    body.innerHTML = `
      <div class="dock-block-top">
        ${buildDockHeroHtml(v)}
        ${agentNotesHtml}
      </div>
      ${noShowHtml}
      ${cancelledHtml}
      ${lostHtml}
      ${assessmentHtml}
      ${activityHtml}`;

    $('#dock-price-proposed')?.addEventListener('change', (e) => {
      v.priceProposed = e.target.checked;
      const wrap = $('#dock-proposed-price-wrap');
      if (wrap) wrap.hidden = !v.priceProposed;
      if (v.status === 'completed') scheduleAssessmentAutosave(v);
    });
    if (v.status === 'completed') {
      bindAssessmentAutosave(v);
      if (v.summary || v.interest || v.buyingSituation || v.priceProposed || v.notesInternal) {
        setAutosaveStatus('saved');
      } else {
        setAutosaveStatus('idle');
      }
    } else {
      setAutosaveStatus('idle');
    }
    $('#dock-activity-all')?.addEventListener('click', () => {
      dockActivityFullView = true;
      renderDock();
    });
    if (v.status !== 'completed') {
      $('#dock-agent-notes')?.addEventListener('blur', (e) => { v.notesInternal = e.target.value.trim(); });
    }

    const fn = viewerFirstName(v.viewer);
    if (v.status === 'scheduled') maybeAutoSendConfirmation(v);
    const autoEmailOn = isAutoConfirmationEnabled();

    if (footer) {
      let ctaHtml = '';
      if (v.status === 'scheduled' || v.status === 'confirmed') {
        if (v.rescheduleRequested) {
          ctaHtml = `<button type="button" class="btn btn-primary dock-cta" id="dock-cta">Reschedule</button>`;
        } else if (v.status === 'scheduled') {
          if (autoEmailOn) {
            ctaHtml = `<p class="dock-footer-note dock-confirmation-auto">Confirmation email was sent automatically because you have enabled automatic reminders and confirmation emails in Settings.</p>`;
          } else {
            const sentLabel = v.confirmationSent ? 'Resend Confirmation Email' : 'Send Confirmation Email';
            ctaHtml = `
              <button type="button" class="btn btn-primary dock-cta" id="dock-cta">
                ${sentLabel}
                <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M3 5h14a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.4"/><path d="M3 6l7 5 7-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
              </button>
              <p class="dock-confirmation-copy">The confirmation email is the main touchpoint — it lets ${esc(fn)} confirm, reschedule, or cancel the viewing.</p>`;
          }
        } else {
          ctaHtml = `<p class="dock-footer-note">Marks as complete automatically after the scheduled viewing ends. To complete early, use the menu above.</p>`;
        }
      } else if (v.status === 'no_show') {
        const rebookDisabled = v.rebookEmailSentAt >= v.rebook && v.rebook > 0 && v.rebook < 3;
        const primary = v.rebook >= 3 ? (v.leadLost ? '' : 'Mark as Lost') : 'Send Rebook Email';
        ctaHtml = `
          ${primary ? `<button type="button" class="btn btn-primary dock-cta" id="dock-cta" ${rebookDisabled && v.rebook < 3 ? 'disabled' : ''}>${primary}</button>` : ''}
          ${!v.leadLost ? `<button type="button" class="btn btn-secondary dock-cta" id="dock-cta-secondary" style="margin-top:${primary ? '8px' : '0'};">Schedule New Viewing</button>` : ''}
          ${rebookDisabled && v.rebook < 3 ? '<p class="dock-footer-note">Rebook email already sent for this attempt.</p>' : ''}`;
      } else if (v.status === 'completed') {
        ctaHtml = `<button type="button" class="btn btn-secondary dock-cta" id="dock-mark-noshow">Mark as no show</button>`;
      } else if (v.status === 'cancelled' && !v.leadLost) {
        const rebookMaxed = (v.rebook || 0) >= 3;
        const rebookDisabled = !rebookMaxed && v.rebookEmailSentAt >= v.rebook && v.rebook > 0;
        ctaHtml = `
          <button type="button" class="btn btn-primary dock-cta" id="dock-cta">Schedule a New Viewing</button>
          <button type="button" class="btn btn-secondary dock-cta" id="dock-cta-secondary"${rebookDisabled || rebookMaxed ? ' disabled' : ''}>Send Rebook Email</button>
          <button type="button" class="btn btn-tertiary dock-cta" id="dock-cta-mark-lost">Mark as Lost</button>
          ${rebookDisabled ? '<p class="dock-footer-note">Rebook email already sent for this attempt.</p>' : ''}`;
      }

      footer.innerHTML = ctaHtml
        ? `<div class="dock-footer">${ctaHtml}</div>`
        : '';

      $('#dock-cta')?.addEventListener('click', () => {
        if (v.rescheduleRequested && (v.status === 'scheduled' || v.status === 'confirmed')) {
          openRescheduleModal(v);
          return;
        }
        if (v.status === 'scheduled') {
          sendConfirmationEmail(v, { automatic: false });
          showToast('Confirmation sent', `${fn} will receive options to confirm, reschedule, or cancel. Switch to Viewer to simulate their response.`);
        } else if (v.status === 'no_show') {
          if (v.rebook >= 3) {
            openMarkLostModal(v);
            return;
          } else if (v.rebookEmailSentAt >= v.rebook && v.rebook > 0) {
            showToast('Already sent', `Rebook email already sent for attempt ${v.rebook}.`, 'warning');
            return;
          } else {
            v.rebook += 1;
            v.rebookEmailSentAt = v.rebook;
            v.activity.unshift({ agents: ['JA'], text: `Rebook email sent to ${fn} — attempt ${v.rebook} of 3`, time: 'Just now' });
            showToast('Rebook email sent', `Attempt ${v.rebook}/3 sent to ${v.viewer}.`);
          }
        } else if (v.status === 'cancelled') {
          openModal('modal-new-viewing');
          return;
        }
        renderAll(); renderDock();
      });
      $('#dock-cta-secondary')?.addEventListener('click', () => {
        if (v.status === 'cancelled') {
          if ((v.rebook || 0) >= 3) {
            showToast('Maximum reached', 'You have used all 3 rebook attempts.', 'warning');
            return;
          }
          if (v.rebookEmailSentAt >= v.rebook && v.rebook > 0) {
            showToast('Already sent', `Rebook email already sent for attempt ${v.rebook}.`, 'warning');
            return;
          }
          v.rebook = (v.rebook || 0) + 1;
          v.rebookEmailSentAt = v.rebook;
          v.activity.unshift({ agents: ['JA'], text: `Rebook email sent to ${fn} — attempt ${v.rebook} of 3`, time: 'Just now' });
          showToast('Rebook email sent', `Attempt ${v.rebook}/3 sent to ${v.viewer}.`);
          renderAll();
          renderDock();
          return;
        }
        openModal('modal-new-viewing');
      });
      $('#dock-cta-mark-lost')?.addEventListener('click', () => openMarkLostModal(v));
      $('#dock-mark-noshow')?.addEventListener('click', () => {
        markViewingAsNoShow(v);
        showToast('Status updated', `${v.viewer} marked as No Show.`);
        renderAll();
        renderDock();
      });
    }
    
    
    
  }


  function isAutoConfirmationEnabled() { return false; }
  function sendConfirmationEmail(v) {
    v.confirmationSent = true;
    v.activity.unshift({ agents: ['JA'], text: 'Confirmation email sent to ' + v.viewer, time: 'Just now' });
  }
  function maybeAutoSendConfirmation() { return false; }
  function markViewingAsComplete(v, { automatic = false } = {}) {
    const fn = viewerFirstName(v.viewer);
    v.status = 'completed';
    v.rescheduleRequested = false;
    const text = automatic
      ? `${fn} completed the viewing`
      : `John Agent marked ${fn}'s viewing as complete`;
    v.activity.unshift({ agents: ['JA'], text, time: 'Just now' });
  }


  function markViewingAsNoShow(v) {
    v.status = 'no_show';
    if (!v.rebook) { v.rebook = 0; v.rebookEmailSentAt = 0; }
    v.activity.unshift({ agents: ['JA'], text: 'Marked ' + v.viewer + ' as no show', time: 'Just now' });
  }
  let assessmentAutosaveTimer = null;

  function setAutosaveStatus(state, message) {
    const el = $('#dock-autosave');
    if (!el) return;
    const icon = el.querySelector('.autosave-status-icon');
    const text = el.querySelector('.autosave-status-text');
    if (state === 'idle') {
      el.hidden = true;
      el.className = 'autosave-status';
      return;
    }
    el.hidden = false;
    el.className = `autosave-status is-${state}`;
    if (text) text.textContent = message || (state === 'saving' ? 'Saving…' : state === 'saved' ? 'Saved' : 'Couldn\'t save');
    if (icon) {
      icon.innerHTML = state === 'saved'
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
        : state === 'error'
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
          : '';
    }
  }

  function persistAssessment(v) {
    v.notesInternal = $('#dock-agent-notes')?.value.trim() || v.notesInternal;
    v.summary = $('#dock-feedback-notes')?.value.trim() || '';
    v.interest = $('#dock-interest')?.value || null;
    v.buyingSituation = $('#dock-buying-situation')?.value || null;
    v.priceProposed = $('#dock-price-proposed')?.checked ?? false;
    const priceRaw = $('#dock-proposed-price')?.value.replace(/[^\d]/g, '') || '';
    if (v.priceProposed && !priceRaw) {
      setAutosaveStatus('error', 'Enter proposed price');
      return false;
    }
    v.proposedPrice = v.priceProposed && priceRaw ? Number(priceRaw) : null;
    if (v.proposedPrice != null) v.offerPrice = v.proposedPrice;
    setAutosaveStatus('saved');
    renderAll();
    
    return true;
  }

  function scheduleAssessmentAutosave(v) {
    setAutosaveStatus('saving');
    clearTimeout(assessmentAutosaveTimer);
    assessmentAutosaveTimer = setTimeout(() => persistAssessment(v), 500);
  }

  function bindAssessmentAutosave(v) {
    const fields = '#dock-agent-notes,#dock-feedback-notes,#dock-interest,#dock-buying-situation,#dock-proposed-price';
    $$(fields).forEach(el => {
      el.addEventListener('input', () => scheduleAssessmentAutosave(v));
      el.addEventListener('change', () => scheduleAssessmentAutosave(v));
    });
  }



  function openModal() { showToast('Prototype', 'Full modal flow lives in agent-view-v5.', 'info'); }
  function openMarkLostModal(v) { v.leadLost = true; showToast('Marked lost', v.viewer + ' marked as lost lead.', 'info'); renderAll(); }

  // Show property address in dock hero (master dashboard)
  (function () {
    const _orig = buildDockHeroHtml;
    buildDockHeroHtml = function (v) {
      const p = prop(v);
      return _orig(v) + `<div class="dock-hero-logistics"><div class="dock-hero-detail-row"><span>Property</span><span>${esc(p.address)} (${esc(p.ref)})</span></div></div>`;
    };
  })();

  setupDockMenu();
  setupViewingClicks();
  renderAll();

})();
</script>
</body>
</html>
