<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Morning dashboard — Homey Agency</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="design-system/homeywebfoundation.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      line-height: var(--lh-body);
      color: var(--fg);
      background: var(--bg-subtle);
    }

    .app {
      display: grid;
      grid-template-columns: 56px 1fr;
      grid-template-rows: 48px auto 1fr;
      height: 100vh;
      min-height: 0;
      overflow: hidden;
    }

    .icon-rail {
      grid-column: 1; grid-row: 1 / -1;
      width: 56px;
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center;
      padding: var(--space-3) 0;
      gap: var(--space-1);
    }
    .rail-logo { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; margin-bottom: var(--space-3); color: var(--purple-600); }
    .rail-item {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-md);
      color: var(--fg-subtle); cursor: pointer;
      transition: background var(--dur-fast);
    }
    .rail-item:hover { background: var(--slate-100); color: var(--fg); }
    .rail-item.is-active { background: var(--purple-50); color: var(--purple-700); }

    .global-header {
      grid-column: 2; grid-row: 1;
      height: 48px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-6);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .header-right { display: flex; align-items: center; gap: var(--space-2); }

    .iteration-bar {
      grid-column: 2; grid-row: 2;
      display: flex; align-items: center; justify-content: space-between; gap: var(--space-4);
      padding: var(--space-3) var(--space-6);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .iteration-bar-left { min-width: 0; }
    .iteration-bar-label { font-size: var(--text-info-label-size); font-weight: var(--fw-semibold); color: var(--fg-muted); }
    .iteration-bar-desc { font-size: var(--text-info-label-size); color: var(--fg-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .iteration-switcher { flex-shrink: 0; overflow-x: auto; }

    /* main scroll replaced by dashboard-body */

    .iteration-panel { display: none; }
    .iteration-panel.is-active { display: block; }

    .proto-tag {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: var(--radius-sm);
      background: var(--purple-50); border: 1px solid var(--purple-200);
      color: var(--purple-700);
      font-size: var(--text-info-label-size); font-weight: var(--fw-semibold);
    }

    .persona-pill {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: 4px 10px; border-radius: var(--radius-full);
      font-size: var(--text-info-label-size); font-weight: var(--fw-semibold);
      margin-bottom: var(--space-3);
    }
    .persona-pill.is-agent { background: var(--purple-50); color: var(--purple-700); border: 1px solid var(--purple-200); }
    .persona-pill.is-owner { background: var(--info-50); color: var(--info-600); border: 1px solid var(--slate-200); }

    /* ── Iteration 1: Day map ── */
    .runway-hero {
      background: var(--bg);
      border: 2px solid var(--purple-400);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-5);
    }
    .runway-hero-label { font-size: var(--text-info-label-size); font-weight: var(--fw-semibold); color: var(--purple-700); margin-bottom: var(--space-2); }
    .runway-hero-main { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-4); flex-wrap: wrap; }
    .runway-hero-time { font-size: var(--text-display-h1-size); font-weight: var(--fw-bold); color: var(--fg-strong); line-height: 1; }
    .runway-track { position: relative; padding-left: var(--space-6); }
    .runway-track::before {
      content: '';
      position: absolute; left: 11px; top: 8px; bottom: 8px;
      width: 2px; background: var(--border);
    }
    .runway-node { position: relative; padding-bottom: var(--space-5); }
    .runway-node:last-child { padding-bottom: 0; }
    .runway-dot {
      position: absolute; left: calc(-1 * var(--space-6) + 4px); top: 14px;
      width: 14px; height: 14px; border-radius: var(--radius-full);
      background: var(--bg); border: 2px solid var(--border);
    }
    .runway-node.is-now .runway-dot { border-color: var(--purple-600); background: var(--purple-600); box-shadow: 0 0 0 4px var(--purple-100); }
    .runway-node.is-done .runway-dot { border-color: var(--success-600); background: var(--success-600); }
    .runway-gap {
      margin: var(--space-2) 0 var(--space-4);
      padding: var(--space-2) var(--space-3);
      border-left: 2px dashed var(--border-strong);
      font-size: var(--text-info-label-size); color: var(--fg-muted);
    }
    .runway-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: var(--space-4);
    }
    .runway-card.is-now { border-color: var(--purple-400); background: var(--purple-50); }
    .runway-card-top { display: flex; justify-content: space-between; gap: var(--space-3); margin-bottom: var(--space-2); }
    .runway-card-title { font-size: var(--text-h3-size); font-weight: var(--fw-semibold); color: var(--fg-strong); }
    .runway-card-meta { font-size: var(--text-info-label-size); color: var(--fg-muted); }

    .dispatch-wrap {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: auto;
      box-shadow: var(--shadow-sm);
    }
    .dispatch-grid {
      display: grid;
      grid-template-columns: 140px repeat(8, minmax(88px, 1fr));
      min-width: 900px;
    }
    .dispatch-cell {
      padding: var(--space-3);
      border-right: 1px solid var(--slate-100);
      border-bottom: 1px solid var(--slate-100);
      min-height: 72px;
      font-size: var(--text-info-label-size);
    }
    .dispatch-cell.is-head {
      background: var(--slate-50); font-weight: var(--fw-semibold);
      color: var(--fg-muted); position: sticky; top: 0; z-index: 1;
    }
    .dispatch-cell.is-agent {
      font-weight: var(--fw-semibold); color: var(--fg-strong);
      background: var(--bg); position: sticky; left: 0; z-index: 1;
      border-right: 1px solid var(--border);
    }
    .dispatch-cell.is-now { background: var(--purple-50); }
    .dispatch-chip {
      display: block; padding: 6px 8px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg);
      margin-bottom: 4px;
      line-height: 1.35;
    }
    .dispatch-chip strong { display: block; color: var(--fg-strong); font-size: var(--text-info-label-size); }
    .dispatch-chip span { color: var(--fg-muted); font-size: var(--text-info-label-size); }
    .dispatch-chip.is-clash { border-color: var(--danger-600); background: var(--danger-50); }
    .dispatch-chip.is-gap { border-style: dashed; color: var(--fg-subtle); background: transparent; text-align: center; padding: 10px 6px; }

    /* ── Iteration 2: Property lens ── */
    .portfolio-strip {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-4);
    }
    .portfolio-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: var(--space-4);
      box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column; gap: var(--space-4);
    }
    .portfolio-card-head strong { display: block; font-size: var(--text-h3-size); color: var(--fg-strong); }
    .portfolio-card-head span { font-size: var(--text-info-label-size); color: var(--fg-muted); }
    .funnel { display: flex; height: 8px; border-radius: var(--radius-full); overflow: hidden; background: var(--slate-100); }
    .funnel-seg { height: 100%; }
    .funnel-seg.is-scheduled { background: var(--slate-400); }
    .funnel-seg.is-confirmed { background: var(--purple-500); }
    .funnel-seg.is-done { background: var(--success-600); }
    .funnel-legend { display: flex; flex-wrap: wrap; gap: var(--space-3); font-size: var(--text-info-label-size); color: var(--fg-muted); }
    .funnel-legend i { display: inline-block; width: 8px; height: 8px; border-radius: var(--radius-full); margin-right: 4px; vertical-align: middle; }
    .portfolio-next {
      padding: var(--space-3); border-radius: var(--radius-md);
      background: var(--slate-50); border: 1px solid var(--slate-100);
    }
    .portfolio-next-label { font-size: var(--text-info-label-size); font-weight: var(--fw-semibold); color: var(--fg-muted); margin-bottom: 4px; }

    .health-matrix-wrap {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .health-matrix .table { margin: 0; }
    .health-risk { display: inline-flex; align-items: center; gap: 6px; }
    .health-risk-dot { width: 8px; height: 8px; border-radius: var(--radius-full); }
    .health-risk-dot.is-high { background: var(--danger-600); }
    .health-risk-dot.is-med { background: var(--orange-600); }
    .health-risk-dot.is-low { background: var(--success-600); }
    .health-bar { display: flex; align-items: center; gap: var(--space-2); }
    .health-bar-track { flex: 1; height: 6px; background: var(--slate-100); border-radius: var(--radius-full); overflow: hidden; max-width: 80px; }
    .health-bar-fill { height: 100%; background: var(--success-600); border-radius: var(--radius-full); }
    .health-bar-fill.is-warn { background: var(--orange-600); }
    .health-bar-fill.is-bad { background: var(--danger-600); }

    /* ── Iteration 3: Exception lens ── */
    .task-stack { display: flex; flex-direction: column; gap: var(--space-3); max-width: 640px; }
    .task-card {
      display: grid; grid-template-columns: auto 1fr auto;
      gap: var(--space-4); align-items: center;
      padding: var(--space-4);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: background var(--dur-fast);
    }
    .task-card:hover { background: var(--slate-50); }
    .task-priority {
      width: 4px; align-self: stretch; border-radius: var(--radius-full);
      background: var(--slate-300);
    }
    .task-priority.is-high { background: var(--danger-600); }
    .task-priority.is-med { background: var(--orange-600); }
    .task-priority.is-low { background: var(--info-600); }
    .task-title { font-size: var(--text-body-size); font-weight: var(--fw-semibold); color: var(--fg-strong); }
    .task-context { font-size: var(--text-info-label-size); color: var(--fg-muted); margin-top: 2px; }
    .task-due { font-size: var(--text-info-label-size); color: var(--fg-muted); white-space: nowrap; text-align: right; }
    .task-due.is-overdue { color: var(--danger-700); font-weight: var(--fw-semibold); }

    .radar-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-4);
    }
    @media (max-width: 900px) { .radar-grid { grid-template-columns: 1fr; } }
    .radar-panel {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: var(--space-5);
      box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column; gap: var(--space-4);
    }
    .radar-panel.is-hot { border-color: var(--danger-600); }
    .radar-panel-head { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-3); }
    .radar-count { font-size: 32px; font-weight: var(--fw-bold); color: var(--fg-strong); line-height: 1; }
    .radar-trend { font-size: var(--text-info-label-size); color: var(--fg-muted); }
    .radar-trend.is-up { color: var(--danger-700); }
    .radar-list { display: flex; flex-direction: column; gap: var(--space-2); }
    .radar-item {
      display: flex; justify-content: space-between; gap: var(--space-3);
      padding: var(--space-3); border-radius: var(--radius-md);
      background: var(--slate-50); font-size: var(--text-info-label-size);
    }
    .radar-item strong { color: var(--fg-strong); font-size: var(--text-body-size); display: block; }
    .radar-item span { color: var(--fg-muted); }

    .iter-mount { min-height: 120px; height: 100%; }

    /* ── Iteration 1: Master list (transactions-style) ── */
    .master-dashboard {
      display: flex; flex-direction: column;
      min-height: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      overflow: hidden; box-shadow: var(--shadow-sm);
    }
    .stats-bar {
      display: flex; align-items: center; justify-content: space-between; gap: var(--space-4);
      padding: var(--space-3) var(--space-5);
      border-bottom: 1px solid var(--border);
      background: var(--bg-subtle); flex-wrap: wrap;
    }
    .stats-user { display: flex; align-items: center; gap: var(--space-3); min-width: 0; }
    .stats-user-text { font-size: var(--fs-sm); color: var(--fg-strong); font-weight: 600; }
    .stats-user-role { font-weight: 400; color: var(--fg-muted); }
    .stats-kpis { display: flex; align-items: center; gap: var(--space-5); flex-wrap: wrap; }
    .kpi { font-size: var(--fs-xs); color: var(--fg-muted); white-space: nowrap; }
    .kpi strong {
      display: block; font-size: var(--fs-md); font-weight: 700;
      color: var(--fg-strong); font-variant-numeric: tabular-nums;
    }
    .stats-actions { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; margin-left: auto; }
    .search-row {
      display: flex; align-items: center; gap: var(--space-2);
      flex: 1; min-width: 240px; max-width: 480px;
    }
    .search-row select.input { width: auto; min-width: 140px; font-size: var(--fs-xs); padding: 8px 10px; }
    .search-field {
      flex: 1; display: flex; align-items: center; gap: 8px;
      padding: 0 10px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }
    .search-field input {
      flex: 1; border: 0; outline: 0; padding: 8px 0;
      font-size: var(--fs-sm); background: transparent; color: var(--fg-strong);
    }
    .search-field input::placeholder { color: var(--fg-muted); }
    .search-field svg { color: var(--fg-muted); flex-shrink: 0; width: 16px; height: 16px; }
    .dashboard-scroll {
      flex: 1; overflow: auto; padding: var(--space-4) var(--space-5) var(--space-5); min-height: 0;
    }
    .section-heading {
      display: flex; align-items: center; gap: 6px;
      font-size: var(--fs-lg); font-weight: 600; color: var(--fg-strong);
      margin-bottom: var(--space-3);
    }
    .section-heading svg { color: var(--fg-muted); }
    .status-tabs {
      display: flex; flex-wrap: wrap; gap: 0;
      border-bottom: 1px solid var(--border); margin-bottom: var(--space-3);
    }
    .status-tab {
      padding: 10px 14px; border: 0; background: transparent;
      font-size: var(--fs-sm); font-weight: 500; color: var(--fg-muted);
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; white-space: nowrap; font-family: inherit;
    }
    .status-tab:hover { color: var(--fg-strong); }
    .status-tab.is-active {
      color: var(--purple-700); border-bottom-color: var(--purple-600); font-weight: 600;
    }
    .status-tab .tab-count { color: var(--fg-muted); font-weight: 500; }
    .filter-bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--space-3); margin-bottom: var(--space-3); flex-wrap: wrap;
    }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .filter-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: var(--radius-full);
      border: 1px solid var(--purple-200); background: var(--purple-50);
      font-size: var(--fs-xs); font-weight: 600; color: var(--purple-700);
      cursor: pointer; font-family: inherit;
    }
    .filter-chip .chip-count {
      background: var(--purple-600); color: var(--bg);
      min-width: 16px; height: 16px; border-radius: var(--radius-full);
      font-size: 10px; display: inline-flex; align-items: center; justify-content: center;
    }
    .filter-links { font-size: var(--fs-xs); color: var(--fg-muted); display: flex; gap: 12px; }
    .filter-links button {
      background: none; border: 0; color: var(--purple-700); font-weight: 600;
      cursor: pointer; font-size: inherit; padding: 0; font-family: inherit;
    }
    .filter-links button:hover { text-decoration: underline; }
    .view-as { display: flex; align-items: center; gap: 8px; font-size: var(--fs-xs); color: var(--fg-muted); }
    .view-as select.input { font-size: var(--fs-xs); padding: 6px 28px 6px 10px; min-width: 140px; }
    .master-table-wrap {
      border: 1px solid var(--border); border-radius: var(--radius-md);
      overflow: auto; background: var(--bg);
    }
    .master-table { width: 100%; border-collapse: collapse; font-size: var(--fs-sm); }
    .master-table th {
      text-align: left; font-weight: 600; font-size: var(--fs-xs);
      padding: 10px 12px; background: var(--bg-subtle);
      color: var(--fg-strong); border-bottom: 1px solid var(--border);
      white-space: nowrap; position: sticky; top: 0; z-index: 1;
    }
    .master-table td {
      padding: 12px; border-bottom: 1px solid var(--slate-100);
      color: var(--fg); vertical-align: middle;
    }
    .master-table tbody tr:hover td { background: var(--slate-50); }
    .master-table tbody tr.is-selected td { background: var(--purple-50); }
    .master-table tbody tr.is-clickable-viewing { cursor: pointer; }
    .master-table tbody tr:last-child td { border-bottom: 0; }
    .th-check, .td-check { width: 36px; }
    .case-link {
      color: var(--purple-700); font-weight: 600; text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px; font-size: var(--fs-xs);
    }
    .case-link:hover { text-decoration: underline; }
    .case-link svg { width: 14px; height: 14px; flex-shrink: 0; }
    .td-applicant { display: flex; align-items: center; gap: 8px; min-width: 130px; }
    .td-applicant .avatar { width: 28px; height: 28px; font-size: 10px; flex-shrink: 0; }
    .td-address { font-size: var(--fs-xs); line-height: 1.45; color: var(--fg); max-width: 200px; }
    .td-agent { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .td-agent .avatar { width: 24px; height: 24px; font-size: 9px; flex-shrink: 0; }
    .td-datetime { white-space: nowrap; font-size: var(--fs-xs); }
    .td-datetime strong { display: block; color: var(--fg-strong); font-weight: 600; }
    .td-datetime span { color: var(--fg-muted); }
    .fb-missing { color: var(--danger-600); font-weight: 600; font-size: var(--fs-xs); }
    .fb-done { color: var(--success-600); font-weight: 600; font-size: var(--fs-xs); }
    .fb-na { color: var(--fg-muted); font-size: var(--fs-xs); }
    .offer-cell { font-weight: 600; font-size: var(--fs-xs); color: var(--fg-strong); font-variant-numeric: tabular-nums; }
    .offer-cell.is-hot { color: var(--success-600); }
    .table-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-top: 1px solid var(--border);
      font-size: var(--fs-xs); color: var(--fg-muted);
    }
    .action-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: var(--radius-full);
      background: var(--danger-50); border: 1px solid var(--danger-200);
      color: var(--danger-700); font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.02em;
    }

    .dashboard-body {
      grid-column: 2; grid-row: 3;
      min-height: 0; overflow: hidden;
      padding: var(--space-6);
    }
    .dashboard-canvas {
      height: 100%; min-width: 0; overflow-y: auto;
    }
    .dashboard-canvas .iteration-panel.is-active { display: block; height: 100%; }

    .is-clickable-viewing { cursor: pointer; transition: background var(--dur-fast); }
    .runway-card.is-clickable-viewing:hover { background: var(--slate-50); }
    .dispatch-chip.is-clickable-viewing { cursor: pointer; }
    .dispatch-chip.is-clickable-viewing:hover { background: var(--slate-50); }
    .health-matrix tbody tr.is-clickable-viewing { cursor: pointer; }
    .health-matrix tbody tr.is-clickable-viewing:hover td { background: var(--slate-50); }
    .radar-item.is-clickable-viewing { cursor: pointer; }
    .radar-item.is-clickable-viewing:hover { background: var(--slate-100); }
    .master-table tbody tr.is-clickable-viewing:hover td { background: var(--slate-50); }

    /* Breadcrumb */
    .breadcrumb { display: flex; align-items: center; gap: 4px; }
    .breadcrumb-item {
      font-size: 13px; color: var(--fg-muted); text-decoration: none;
    }
    .breadcrumb-item:hover { color: var(--fg); }
    .breadcrumb-item.is-current { color: var(--fg-strong); font-weight: 500; }

              <option value="vendor"${masterSearchField === 'vendor' ? ' selected' : ''}>Vendor name</option>
            </select>
            <div class="search-field">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="search" id="master-search-input" placeholder="Type to search…" value="${esc(masterSearch)}" aria-label="Search viewings">
            </div>
          </div>
          <button type="button" class="btn btn-secondary btn-sm">Export</button>
          <button type="button" class="btn btn-primary btn-sm">Create viewing</button>
        </div>
      </div>
      <div class="dashboard-scroll">
        <h2 class="section-heading">
          All viewings
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </h2>
        <div class="status-tabs" role="tablist" aria-label="Viewing status" id="master-status-tabs">${tabsHtml}</div>
        <div class="filter-bar">
          <div class="filter-chips">
            <button type="button" class="filter-chip" data-master-tab="needs-action">Needs action <span class="chip-count">${needsActionCount}</span></button>
            <button type="button" class="filter-chip" data-master-tab="today">Today <span class="chip-count">${tabCount('today')}</span></button>
            <button type="button" class="filter-chip">Sort <span class="chip-count">2</span></button>
            <span class="filter-links">
              <button type="button" id="master-reset-view">Reset view</button>
              <button type="button">Save as new view</button>
            </span>
          </div>
          <div class="view-as">
            <span>View as</span>
            <select class="input" id="master-view-as" aria-label="Saved view">
              <option${masterTab === 'today' ? ' selected' : ''} value="today">Today</option>
              <option${masterTab === 'needs-action' ? ' selected' : ''} value="needs-action">Needs action</option>
              <option${masterTab === 'all' ? ' selected' : ''} value="all">All viewings</option>
            </select>
          </div>
        </div>
        <div class="master-table-wrap">
          <table class="master-table">
            <thead>
              <tr>
                <th class="th-check"><input type="checkbox" aria-label="Select all"></th>
                <th>Case</th>
                <th>Date &amp; time</th>
                <th>Applicant</th>
                <th>Property</th>
                <th>Vendor</th>
                <th>Agent</th>
                <th>Status</th>
                <th>Feedback</th>
                <th>Offer</th>
                <th></th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rows || emptyRow}</tbody>
          </table>
          <div class="table-footer">
            <span>Showing ${filtered.length} of ${viewings.length} viewings${isOwner() ? '' : ' assigned to you'}</span>
            <span>${esc(new Date(`${TODAY}T12:00`).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }))}</span>
          </div>
        </div>
      </div>
    </div>`;
  }

  function bindMasterList() {
    const mount = $('#mount-2');
    if (!mount) return;
    mount.querySelectorAll('[data-master-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        masterTab = btn.dataset.masterTab;
        renderIteration(2);
        bindMasterList();
      });
    });
    const searchInput = mount.querySelector('#master-search-input');
    searchInput?.addEventListener('input', e => {
      masterSearch = e.target.value;
      renderIteration(2);
      bindMasterList();
      const input = mount.querySelector('#master-search-input');
      if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
    });
    mount.querySelector('#master-search-field')?.addEventListener('change', e => {
      masterSearchField = e.target.value;
      renderIteration(2);
      bindMasterList();
    });
    mount.querySelector('#master-view-as')?.addEventListener('change', e => {
      masterTab = e.target.value;
      renderIteration(2);
      bindMasterList();
    });
    mount.querySelector('#master-reset-view')?.addEventListener('click', () => {
      masterTab = 'today';
      masterSearch = '';
      masterSearchField = 'applicant';
      renderIteration(2);
      bindMasterList();
    });
  }

  function buildAgencyContextRail(viewings) {
    const caseIds = scopeCases();
    const todayViewings = viewings.filter(v => v.date === TODAY && v.status !== 'cancelled');
    const blockers = caseIds.reduce((n, id) => n + (CASES[id].blockers?.length || 0), 0);
    const offerCases = caseIds.filter(id => CASES[id].steps?.offer === 'active').length;
    return `
      <div class="ctx-card is-accent">
        <div class="ctx-card-head"><span class="ctx-card-title">Your day</span></div>
        <h3>${todayViewings.length} viewings today</h3>
        <p>Across ${new Set(todayViewings.map(v => v.propertyId)).size} properties · ${caseIds.length} active cases</p>
        <div class="ctx-stat-grid">
          <div class="ctx-stat"><label>Blockers</label><strong>${blockers}</strong></div>
          <div class="ctx-stat"><label>Needs action</label><strong>${viewings.filter(needsAction).length}</strong></div>
          <div class="ctx-stat"><label>At offer stage</label><strong>${offerCases}</strong></div>
          <div class="ctx-stat"><label>Missing feedback</label><strong>${viewings.filter(v => v.status === 'completed' && !v.summary?.trim()).length}</strong></div>
        </div>
      </div>
      <div class="ctx-card">
        <div class="ctx-card-head"><span class="ctx-card-title">Coming up</span></div>
        <div class="ctx-list">
          ${todayViewings.slice(0, 4).map(v => {
            const p = prop(v);
            return `<button type="button" class="ctx-card-action" data-select-case data-case-id="${esc(v.propertyId)}">
              <div><strong>${esc(fmtClock(v.time))} · ${esc(v.viewer)}</strong><span>${esc(p.ref)}</span></div>
            </button>`;
          }).join('') || '<p>No viewings left today.</p>'}
        </div>
      </div>
      <div class="ctx-card">
        <div class="ctx-card-head"><span class="ctx-card-title">Branch signals</span></div>
        <p>Cases with vendor updates overdue, stuck listings, or offers awaiting selection surface here when you select a row.</p>
      </div>`;
  }

  function buildCaseContextRail(id) {
    const c = CASES[id];
    const p = PROPERTIES[id];
    const today = caseViewingsToday(id);
    const all = caseViewings(id);
    const offers = all.filter(v => v.offerPrice);
    const ns = c.nextStep;
    const miniRail = WORKFLOW_STEPS.map(s => {
      const st = c.steps[s.id] || 'pending';
      return `<span class="ctx-mini-step is-${st}">${esc(s.label)}</span>`;
    }).join('');

    const todayList = today.length ? today.map(v =>
      `<button type="button" class="ctx-card-action" data-open-case data-case-id="${esc(id)}" data-workflow="viewings" data-viewing-id="${esc(v.id)}">
        <div><strong>${esc(fmtClock(v.time))} · ${esc(v.viewer)}</strong><span>${esc(STATUS_LABEL[v.status] || v.status)} · ${esc(todayViewingAction(v))}</span></div>
      </button>`
    ).join('') : '<p>No viewings scheduled today on this case.</p>';

    const blockersCard = (c.blockers?.length) ? `
      <div class="ctx-card is-alert">
        <div class="ctx-card-head"><span class="ctx-card-title">Blockers</span><span class="blocker-count">${c.blockers.length}</span></div>
        <div class="ctx-list">
          ${c.blockers.map(b => `
            <button type="button" class="ctx-card-action" data-open-case data-case-id="${esc(id)}" data-workflow="${esc(b.workflow)}"${b.viewingId ? ` data-viewing-id="${esc(b.viewingId)}"` : ''}>
              <div><strong>${esc(b.label)}</strong><span>${esc(b.detail)}</span></div>
            </button>`).join('')}
        </div>
      </div>` : '';

    const offersCard = offers.length ? `
      <div class="ctx-card">
        <div class="ctx-card-head"><span class="ctx-card-title">Offers on the table</span></div>
        <div class="ctx-list">
          ${offers.map(v => `
            <div class="ctx-list-item">
              <div><strong>${esc(v.viewer)}</strong><span>${esc(fmtOffer(v.offerPrice))}</span></div>
            </div>`).join('')}
        </div>
      </div>` : '';

    const vendorWarn = p.vendorUpdateDays > 3
      ? `<div class="ctx-card is-alert">
          <div class="ctx-card-head"><span class="ctx-card-title">Vendor pulse</span></div>
          <p><strong>Last vendor update ${p.vendorUpdateDays} days ago.</strong> Consider sending a viewing summary before today's appointments.</p>
          <button type="button" class="btn btn-secondary btn-sm" style="width:100%" data-open-case data-case-id="${esc(id)}" data-workflow="viewings">Send vendor update</button>
        </div>` : '';

    return `
      <div class="ctx-card is-accent">
        <div class="ctx-card-head"><span class="ctx-card-title">Selected case</span><span class="case-stage-pill">${esc(c.stage)}</span></div>
        <h3>${esc(p.ref)}</h3>
        <p>${esc(p.address)}, ${esc(p.area)}</p>
        <p>${esc(p.vendor)} · ${esc(c.leadAgent)} · ${esc('£' + p.price.toLocaleString('en-GB'))}</p>
        <div class="ctx-mini-rail">${miniRail}</div>
        <button type="button" class="btn btn-primary btn-sm" style="width:100%" data-open-case data-case-id="${esc(id)}" data-workflow="${esc(ns.workflow)}"${ns.viewingId ? ` data-viewing-id="${esc(ns.viewingId)}"` : ''}>Open case workflow</button>
      </div>
      <div class="ctx-card">
        <div class="ctx-card-head"><span class="ctx-card-title">Next step</span></div>
        <h3>${esc(ns.label)}</h3>
        <p>${esc(ns.detail)}</p>
      </div>
      ${blockersCard}
      <div class="ctx-card">
        <div class="ctx-card-head"><span class="ctx-card-title">Viewings today</span>${today.length ? `<span class="today-dot">${today.length}</span>` : ''}</div>
        ${todayList}
      </div>
      ${offersCard}
      ${vendorWarn}
      <div class="ctx-card">
        <div class="ctx-card-head"><span class="ctx-card-title">Case activity</span></div>
        <div class="ctx-list">
          <div class="ctx-list-item"><div><strong>${all.filter(v => v.status === 'completed').length} completed viewings</strong><span>${all.length} total on this case</span></div></div>
          <div class="ctx-list-item"><div><strong>${offers.length} offer${offers.length === 1 ? '' : 's'} logged</strong><span>From applicant viewings</span></div></div>
        </div>
      </div>`;
  }

  function renderSplitView() {
    const viewings = scopeViewings();
    let caseIds = scopeCases();
    if (splitFilter === 'blocked') caseIds = caseIds.filter(id => (CASES[id].blockers?.length || 0) > 0);
    if (splitFilter === 'today') caseIds = caseIds.filter(id => caseViewingsToday(id).length > 0);
    if (!splitSelectedId || !caseIds.includes(splitSelectedId)) splitSelectedId = caseIds[0] || null;

    const rows = caseIds.map(id => {
      const c = CASES[id];
      const p = PROPERTIES[id];
      const todayCount = caseViewingsToday(id).length;
      const blockerN = c.blockers?.length || 0;
      const sel = id === splitSelectedId ? ' is-selected' : '';
      const rowCls = [todayCount ? 'is-today' : '', blockerN ? 'is-blocked' : '', sel.trim()].filter(Boolean).join(' ');
      return `<tr class="${rowCls}" data-select-case data-case-id="${esc(id)}" tabindex="0" role="row" aria-selected="${id === splitSelectedId}">
        <td><div class="case-table-ref">${esc(p.ref)}</div><div class="case-table-addr">${esc(p.address)}</div></td>
        <td><span class="case-stage-pill">${esc(c.stage)}</span></td>
        <td><div class="case-table-next">${esc(c.nextStep.label)}</div></td>
        <td><span class="blocker-count${blockerN ? '' : ' is-clear'}">${blockerN || '—'}</span></td>
        <td>${todayCount ? `<span class="today-dot">${todayCount}</span>` : '<span style="color:var(--fg-muted);font-size:var(--fs-xs)">—</span>'}</td>
        <td>${esc(c.leadAgent.split(' ')[0])}</td>
      </tr>`;
    }).join('');

    const railHtml = splitSelectedId
      ? buildCaseContextRail(splitSelectedId)
      : buildAgencyContextRail(viewings);

    return `<div class="split-layout">
      <div class="split-main">
        <div class="split-main-head">
          <h2>Your cases</h2>
          <div class="cases-filters" id="split-filters">
            <button type="button" class="cases-filter${splitFilter === 'all' ? ' is-active' : ''}" data-split-filter="all">All</button>
            <button type="button" class="cases-filter${splitFilter === 'blocked' ? ' is-active' : ''}" data-split-filter="blocked">Has blockers</button>
            <button type="button" class="cases-filter${splitFilter === 'today' ? ' is-active' : ''}" data-split-filter="today">Viewings today</button>
          </div>
        </div>
        <div class="split-main-body">
          <table class="case-table">
            <thead>
              <tr>
                <th>Case</th>
                <th>Stage</th>
                <th>Next step</th>
                <th>Blockers</th>
                <th>Today</th>
                <th>Agent</th>
              </tr>
            </thead>
            <tbody>${rows || '<tr><td colspan="6" style="padding:32px;text-align:center;color:var(--fg-muted)">No cases match this filter.</td></tr>'}</tbody>
          </table>
        </div>
      </div>
      <aside class="split-rail" aria-label="Context">${railHtml}</aside>
    </div>`;
  }

  function bindSplitView() {
    const mount = $('#mount-3');
    if (!mount) return;
    mount.querySelectorAll('[data-split-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        splitFilter = btn.dataset.splitFilter;
        renderIteration(3);
        bindSplitView();
      });
    });
    mount.querySelectorAll('[data-select-case]').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.closest('[data-open-case]')) return;
        e.stopPropagation();
        splitSelectedId = el.dataset.caseId;
        renderIteration(3);
        bindSplitView();
      });
    });
  }

  const RENDERERS = {
    1: { agent: renderMorningBoard, owner: renderMorningBoard },
    2: { agent: renderMasterList, owner: renderMasterList },
    3: { agent: renderSplitView, owner: renderSplitView },
  };

  function renderIteration(n) {
    const m = $(`#mount-${n}`);
    if (m) m.innerHTML = (RENDERERS[n][persona] || (() => ''))();
    if (n === 1) bindMorningBoard();
    if (n === 2) bindMasterList();
    if (n === 3) bindSplitView();
  }

  function setupCaseNavigation() {
    const c = $('#dashboard-canvas');
    if (!c) return;
    c.addEventListener('click', e => {
      const selectEl = e.target.closest('[data-select-case]');
      if (selectEl && !e.target.closest('[data-open-case]') && activeIteration === 3 && selectEl.closest('.case-table')) {
        splitSelectedId = selectEl.dataset.caseId;
        renderIteration(3);
        bindSplitView();
        return;
      }
      const openCaseEl = e.target.closest('[data-open-case]');
      if (openCaseEl) {
        openCase(openCaseEl.dataset.caseId, openCaseEl.dataset.workflow, openCaseEl.dataset.viewingId || null);
        return;
      }
      const el = e.target.closest('[data-viewing-id]');
      if (el && !el.closest('[data-open-case]')) openCaseFromViewing(el.dataset.viewingId);
    });
    c.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const selectEl = e.target.closest('[data-select-case]');
      if (selectEl && activeIteration === 3 && selectEl.closest('.case-table')) {
        e.preventDefault();
        splitSelectedId = selectEl.dataset.caseId;
        renderIteration(3);
        bindSplitView();
        return;
      }
      const openCaseEl = e.target.closest('[data-open-case]');
      if (openCaseEl) {
        e.preventDefault();
        openCase(openCaseEl.dataset.caseId, openCaseEl.dataset.workflow, openCaseEl.dataset.viewingId || null);
        return;
      }
      const el = e.target.closest('[data-viewing-id]');
      if (!el || el.closest('[data-open-case]')) return;
      e.preventDefault();
      openCaseFromViewing(el.dataset.viewingId);
    });
  }

  function renderAll() {
    $('#iteration-desc').textContent = ITERATION_DESC[persona][activeIteration] || '';
    [1, 2, 3].forEach(renderIteration);
  }

  function switchPersona(p) {
    persona = p;
    document.querySelectorAll('#persona-tabs .btn-group-item').forEach(btn => {
      const on = btn.dataset.persona === persona;
      btn.classList.toggle('is-active', on);
      btn.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    renderAll();
  }

  function switchIteration(n) {
    activeIteration = n;
    document.querySelectorAll('.iteration-panel').forEach(p => p.classList.remove('is-active'));
    document.querySelectorAll('#iteration-tabs .tab-segmented').forEach(t => {
      const on = Number(t.dataset.iteration) === n;
      t.classList.toggle('is-active', on);
      t.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    $(`#iteration-${n}`)?.classList.add('is-active');
    $('#iteration-desc').textContent = ITERATION_DESC[persona][n] || '';
  }

  $('#persona-tabs').addEventListener('click', e => { const btn = e.target.closest('[data-persona]'); if (btn && btn.dataset.persona !== persona) switchPersona(btn.dataset.persona); });
  $('#iteration-tabs').addEventListener('click', e => { const btn = e.target.closest('[data-iteration]'); if (btn) switchIteration(Number(btn.dataset.iteration)); });

  setupCaseNavigation();
  renderAll();

})();
</script>
</body>
</html>
